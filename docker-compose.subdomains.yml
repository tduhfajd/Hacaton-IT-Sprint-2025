version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.simple
    container_name: smart-support-backend
    environment:
      - VIRTUAL_HOST=api-smartsupport.vadimevgrafov.ru
      - VIRTUAL_PORT=3001
      - LETSENCRYPT_HOST=api-smartsupport.vadimevgrafov.ru
      - LETSENCRYPT_EMAIL=admin@vadimevgrafov.ru
      - NODE_ENV=production
      - CORS_ORIGINS=https://user-smartsupport.vadimevgrafov.ru,https://operator-smartsupport.vadimevgrafov.ru,https://admin-smartsupport.vadimevgrafov.ru
    networks:
      - nginx-net
    depends_on:
      - db
      - redis

  # Frontend - пользовательский интерфейс
  frontend-user:
    build: ./frontend
    container_name: smart-support-frontend-user
    environment:
      - VIRTUAL_HOST=user-smartsupport.vadimevgrafov.ru
      - VIRTUAL_PORT=3000
      - LETSENCRYPT_HOST=user-smartsupport.vadimevgrafov.ru
      - LETSENCRYPT_EMAIL=admin@vadimevgrafov.ru
      - REACT_APP_API_URL=https://api-smartsupport.vadimevgrafov.ru
    networks:
      - nginx-net
    depends_on:
      - backend

  # Frontend - панель операторов
  frontend-operator:
    build: ./frontend
    container_name: smart-support-frontend-operator
    environment:
      - VIRTUAL_HOST=operator-smartsupport.vadimevgrafov.ru
      - VIRTUAL_PORT=3000
      - LETSENCRYPT_HOST=operator-smartsupport.vadimevgrafov.ru
      - LETSENCRYPT_EMAIL=admin@vadimevgrafov.ru
      - REACT_APP_API_URL=https://api-smartsupport.vadimevgrafov.ru
    networks:
      - nginx-net
    depends_on:
      - backend

  # Frontend - административная панель
  frontend-admin:
    build: ./frontend
    container_name: smart-support-frontend-admin
    environment:
      - VIRTUAL_HOST=admin-smartsupport.vadimevgrafov.ru
      - VIRTUAL_PORT=3000
      - LETSENCRYPT_HOST=admin-smartsupport.vadimevgrafov.ru
      - LETSENCRYPT_EMAIL=admin@vadimevgrafov.ru
      - REACT_APP_API_URL=https://api-smartsupport.vadimevgrafov.ru
    networks:
      - nginx-net
    depends_on:
      - backend

  # База данных
  db:
    image: postgres:15
    container_name: smart-support-db
    environment:
      - POSTGRES_DB=smart_assistant
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nginx-net

  # Redis
  redis:
    image: redis:7-alpine
    container_name: smart-support-redis
    volumes:
      - redis_data:/data
    networks:
      - nginx-net

  # Файловое хранилище и документация
  docs:
    image: nginx:alpine
    container_name: smart-support-docs
    environment:
      - VIRTUAL_HOST=docs-smartsupport.vadimevgrafov.ru
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=docs-smartsupport.vadimevgrafov.ru
      - LETSENCRYPT_EMAIL=admin@vadimevgrafov.ru
    volumes:
      - ./files:/usr/share/nginx/html/files:ro
      - ./static:/usr/share/nginx/html:ro
      - ./nginx-docs.conf:/etc/nginx/nginx.conf:ro
    networks:
      - nginx-net

  # Мониторинг
  monitor:
    build: ./frontend
    container_name: smart-support-monitor
    environment:
      - VIRTUAL_HOST=monitor-smartsupport.vadimevgrafov.ru
      - VIRTUAL_PORT=3000
      - LETSENCRYPT_HOST=monitor-smartsupport.vadimevgrafov.ru
      - LETSENCRYPT_EMAIL=admin@vadimevgrafov.ru
      - REACT_APP_API_URL=https://api-smartsupport.vadimevgrafov.ru
    networks:
      - nginx-net
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:

networks:
  nginx-net:
    external: true
