version: '3.8'

services:
  # База данных
  db:
    image: postgres:15
    container_name: smart-support-db
    environment:
      - POSTGRES_DB=smart_assistant
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis
  redis:
    image: redis:7-alpine
    container_name: smart-support-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
