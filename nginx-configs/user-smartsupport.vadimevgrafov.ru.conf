server {
    listen 443 ssl http2;
    server_name user-smartsupport.vadimevgrafov.ru;

    ssl_certificate /etc/nginx/certs/user-smartsupport.vadimevgrafov.ru.crt;
    ssl_certificate_key /etc/nginx/certs/user-smartsupport.vadimevgrafov.ru.key;
    ssl_dhparam /etc/nginx/certs/user-smartsupport.vadimevgrafov.ru.dhparam.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass http://192.168.100.109:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    server_name user-smartsupport.vadimevgrafov.ru;
    return 301 https://$server_name$request_uri;
}

